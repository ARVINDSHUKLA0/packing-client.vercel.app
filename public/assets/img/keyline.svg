<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <!-- Top flap -->
  <rect id="top"   x="140" y="0"   width="200" height="140" fill="#eeeeee" stroke="#333" stroke-dasharray="4 3"/>

  <!-- Main wall strip -->
  <rect id="left"  x="0"   y="140" width="140" height="120" fill="#e0e0e0" stroke="#333"/>
  <rect id="Front" x="140" y="140" width="200" height="120" fill="#d8d8d8" stroke="#333"/>
  <rect id="right" x="340" y="140" width="140" height="120" fill="#e0e0e0" stroke="#333"/>
  <rect id="back"  x="480" y="140" width="200" height="120" fill="#cfcfcf" stroke="#333"/>

  <!-- Bottom/lock flap -->
  <rect id="lock"  x="140" y="260" width="200" height="140" fill="#f0f0f0" stroke="#333" stroke-dasharray="4 3"/>
</svg>
